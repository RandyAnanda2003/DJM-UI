<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="static/telkom.png">
    <title>DJM Automate</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

   <!-- NAVBAR -->
    <nav class="w-full bg-gradient-to-r from-gray-900 to-gray-800 text-white py-3 sm:py-4 shadow-lg">
        <div class="container mx-auto px-4 sm:px-6">

            <div class="flex items-center w-full">
                <!-- Logo + Title -->
                <a href="index.html" class="flex items-center gap-2 sm:gap-3">
                    <img src="/static/telkom.png" alt="logo" class="w-8 h-8 sm:w-10 sm:h-10">
                    <div class="text-base sm:text-xl font-semibold whitespace-nowrap text-white">
                        DJM <span class="font-light">Automate</span>
                    </div>
                </a>

                <!-- Menu Desktop -->
                <div class="hidden md:flex items-center gap-6 ml-12">
                    <a href="index.html" class="hover:text-gray-300 transition">About</a>
                    <a href="login.html" class="hover:text-gray-300 transition">make DJM</a>
                </div>

                <!-- Spacer -->
                <div class="flex-1"></div>

                <!-- Logout/Login Button Desktop -->
                    <a href="login.html">
                        <button class="hidden md:block px-6 py-2 rounded-full text-white font-semibold
                            bg-gray-800
                            border-2 border-gray-700
                            shadow-lg
                            transition-all duration-300
                            hover:bg-gray-900 hover:scale-105">
                            LOGIN
                        </button>
                    </a>

                <!-- Mobile Menu Button -->
                <button 
                    onclick="toggleMobileMenu()"
                    class="md:hidden p-2 rounded-lg hover:bg-gray-700 transition"
                    id="mobileMenuBtn"
                >
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>

            <!-- Mobile Menu Dropdown -->
            <div id="mobileMenu" class="hidden md:hidden mt-4 pb-2 border-t border-gray-700 pt-4">
                <div class="flex flex-col gap-3">
                    <a href="index.html" class="hover:text-gray-300 transition py-2">About</a>
                    <a href="login.html" class="hover:text-gray-300 transition py-2">make DJM</a>
                        <a href="#">
                            <button class="w-full px-6 py-2 rounded-full text-white font-semibold
                                bg-gray-800
                                border-2 border-gray-700
                                shadow-lg
                                transition-all duration-300
                                hover:bg-gray-900 active:scale-95">
                                LOGIN
                            </button>
                        </a>
                </div>
            </div>

        </div>
    </nav>

    <!-- Login Section -->
    <div class="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-black flex items-center justify-center px-4 py-12">
        
        <div class="w-full max-w-md">
            
            <!-- Glass Card Login -->
            <div class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl shadow-2xl p-8 sm:p-10">
                
                <!-- Logo/Header -->
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-red-600 to-gray-800 rounded-2xl mb-4">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                    </div>
                    <h1 class="text-3xl sm:text-4xl font-bold text-white mb-2">
                        Selamat Datang
                    </h1>
                    <p class="text-gray-100 text-sm sm:text-base">
                        Silakan login ke DJM Automate
                    </p>
                </div>

                <!-- Login Form -->
                <form method="POST" action="login.html" class="space-y-6">
                    
                    <!-- Username Input -->
                    <div>
                        <label for="username" class="block text-sm font-semibold text-white mb-2">
                            Username
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                </svg>
                            </div>
                            <input 
                                type="text" 
                                id="username" 
                                name="username" 
                                required
                                placeholder="Masukkan username"
                                class="w-full pl-12 pr-4 py-3 bg-white/20 border border-white/30 rounded-xl text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all duration-300"
                            >
                        </div>
                    </div>

                    <!-- Password Input -->
                    <div>
                        <label for="password" class="block text-sm font-semibold text-white mb-2">
                            Password
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                </svg>
                            </div>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                required
                                placeholder="Masukkan password"
                                class="w-full pl-12 pr-4 py-3 bg-white/20 border border-white/30 rounded-xl text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all duration-300"
                            >
                        </div>
                    </div>
                    <button 
                        type="button"
                        onclick="alert('Maaf, username atau password yang anda masukkan salah. Silakan hubungi admin.'); window.location.href='login.html';"
                        class="w-full py-3 px-6 rounded-xl font-bold text-base
                        bg-red-600 hover:bg-red-700 text-white
                        shadow-xl hover:shadow-2xl hover:scale-105 active:scale-95
                        transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 focus:ring-offset-transparent border border-red-700">
                        Masuk
                    </button>

                </form>

                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-white/20"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-transparent text-gray-200">Powered by</span>
                    </div>
                </div>

                <!-- Apilogy Logo -->
                 <a href="http://apilogy.id">
                    <div class="text-center">
                        <img src="/static/apilogy.png" alt="APILOGY" class="inline-block h-8 opacity-90">
                    </div>
                </a>

            </div>

            <!-- Additional Info -->
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-200">
                    Belum punya akun? 
                    <a href="#" class="text-red-400 hover:text-red-300 font-semibold transition-colors duration-300">
                        Hubungi Admin
                    </a>
                </p>
            </div>

            <!-- Back to Home -->
            <div class="mt-4 text-center">
                <a href="index.html" class="inline-flex items-center gap-2 text-sm text-gray-200 hover:text-white transition-colors duration-300">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                    Kembali ke Beranda
                </a>
            </div>

        </div>

    </div>


    <!-- Mobile Menu Toggle Script -->
    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('hidden');
        }

        document.addEventListener('click', function(event) {
            const menu = document.getElementById('mobileMenu');
            const btn = document.getElementById('mobileMenuBtn');
            if (!menu.contains(event.target) && !btn.contains(event.target)) {
                menu.classList.add('hidden');
            }
        });

    </script>

</body>
</html>
